name: My First Pipeline

on:
  push:
    branchs:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: docker login
      uses: docker/login-action@v3
      with:
        username: {{ secrets.DOCKER_USERNAME }}
        password: {{ secrets.DOCKER_PASSWORD }}
    - name: build and push docker image
      run: docker build -t python-flask-app .
    - name: docker tag
      run: docker tag python-flask-app:latest abdullha123/python-flask-app:latest
    - name: docker push
      run: docker push abdullha123/python-flask-app:latest
    - name: Deploy to azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: devops-class
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PORFILE }}
        images: abdullha123/python-flask-app:latest
