name: My First Pipeline

on:
  push:
    branchs:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: setup-python
      uses: actions/setup-python@v5
    - name: install package
      run: pip install flask
    - name: check hostname
      run: hostname
